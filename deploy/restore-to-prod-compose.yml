# EMERGENCY DISASTER RECOVERY — restore the newest nightly R2 dump INTO THE LIVE
# PRODUCTION DATABASE. This is DESTRUCTIVE: `pg_restore --clean` drops and recreates
# objects, overwriting current prod data. Only run after confirming prod data is lost or
# corrupt. For a non-destructive rehearsal against scratch, use restore-drill-compose.yml.
#
# Usage (Hostinger MCP), see docs/ops.md "Restore to production":
#   1. Create a one-off project named "restoretoprod" from THIS file.
#   2. Set project env: POSTGRES_PASSWORD + S3_ENDPOINT + S3_PRIVATE_BUCKET +
#      S3_ACCESS_KEY_ID + S3_SECRET_ACCESS_KEY, and CONFIRM=RESTORE (the safety latch).
#   3. Start it, read the logs to confirm the restore + exit code.
#   4. Verify the app, then DELETE this project.
#
# Joins the prod project's network (external) to reach the `db` service.
services:
  restore:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      CONFIRM: ${CONFIRM:-}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PRIVATE_BUCKET: ${S3_PRIVATE_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - "if [ \"$$CONFIRM\" != RESTORE ]; then echo '[restore] refusing: set CONFIRM=RESTORE to overwrite prod'; sleep 30; exit 1; fi && apk add --no-cache curl ca-certificates >/dev/null && EP=$${S3_ENDPOINT%/} && DOW=$$(date -u +%w) && OK='' && for i in 0 1 2 3 4 5 6; do idx=$$(( (DOW - i + 7) % 7 )); set -- Sun Mon Tue Wed Thu Fri Sat; shift $$idx; D=$$1; echo \"[restore] trying backups/db-$$D.dump\"; if curl -sf --aws-sigv4 aws:amz:auto:s3 --user \"$$S3_ACCESS_KEY_ID:$$S3_SECRET_ACCESS_KEY\" -o /tmp/r.dump \"$$EP/$$S3_PRIVATE_BUCKET/backups/db-$$D.dump\"; then OK=$$D; break; fi; done && if [ -z \"$$OK\" ]; then echo '[restore] FAIL: no dump found in last 7 days'; exit 1; fi && echo \"[restore] restoring db-$$OK.dump ($$(du -h /tmp/r.dump | cut -f1)) into PROD\" && pg_restore -h db -U freelanceai -d freelanceai --clean --if-exists --no-owner --no-privileges /tmp/r.dump; echo \"[restore] pg_restore exit=$$? — verify the app, then DELETE this project\" && sleep 120"

networks:
  default:
    name: freelanceai_default
    external: true
