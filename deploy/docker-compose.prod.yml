# Production stack for the shared Hostinger VPS (deployed via the Hostinger MCP as
# project "freelanceai"). Exposure is via Cloudflare Tunnel (cloudflared) — no host
# ports are published, so the box's existing nginx (80/443) and other apps are
# untouched. Postgres stays internal. Secrets come from the project environment:
#   POSTGRES_PASSWORD, SESSION_SECRET, CLOUDFLARE_TUNNEL_TOKEN,
#   TELEGRAM_BOT_TOKEN, TELEGRAM_BOT_USERNAME  (never committed here).
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: freelanceai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: freelanceai
    volumes:
      - freelanceai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freelanceai -d freelanceai"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    image: node:24-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://freelanceai:${POSTGRES_PASSWORD}@db:5432/freelanceai?schema=public"
    entrypoint: ["sh", "-c"]
    command:
      - "apk add --no-cache wget ca-certificates openssl && wget -O schema.prisma https://raw.githubusercontent.com/akmalidinalimov/freelanceai/main/prisma/schema.prisma && npx -y prisma@6.19.3 db push --schema=schema.prisma --skip-generate"
    restart: "no"

  app:
    # Build the image on the VPS directly from the public GitHub repo (no registry).
    build:
      context: "https://github.com/akmalidinalimov/freelanceai.git#main"
      dockerfile: Dockerfile
    image: freelanceai-app:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://freelanceai:${POSTGRES_PASSWORD}@db:5432/freelanceai?schema=public"
      SESSION_SECRET: ${SESSION_SECRET}
      APP_ORIGIN: "https://freelanceai.alikhanova.cloud"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      PLATFORM_COMMISSION_PCT: "20"
    expose:
      - "3000"

  # Outbound connector to Cloudflare; routes freelanceai.alikhanova.cloud -> app:3000.
  # The public-hostname mapping is configured in the Cloudflare dashboard (remote-managed
  # tunnel); cloudflared only needs the token.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app

volumes:
  freelanceai_pgdata:
