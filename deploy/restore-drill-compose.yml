# Backup RESTORE DRILL — throwaway project (name: restoredrill), fully separate from
# the "freelanceai" prod project. Spins a scratch Postgres on tmpfs (RAM, no volume),
# downloads the most recent nightly dump from the private R2 bucket, pg_restores it,
# prints row counts to the logs for verification, then idles until the project is
# deleted. Run via deploy/restore-drill.ps1; results read from project logs.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: drill
      POSTGRES_PASSWORD: drill
      POSTGRES_DB: drill
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drill -d drill"]
      interval: 5s
      timeout: 5s
      retries: 20

  restore:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: drill
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PRIVATE_BUCKET: ${S3_PRIVATE_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      # Try today's dump, then yesterday's, then 2 days back (weekday-named keys).
      - "apk add --no-cache curl ca-certificates >/dev/null && EP=$${S3_ENDPOINT%/} && DOW=$$(date -u +%w) && OK='' && for i in 0 1 2; do idx=$$(( (DOW - i + 7) % 7 )); set -- Sun Mon Tue Wed Thu Fri Sat; shift $$idx; D=$$1; echo \"[drill] trying backups/db-$$D.dump\"; if curl -sf --aws-sigv4 aws:amz:auto:s3 --user \"$$S3_ACCESS_KEY_ID:$$S3_SECRET_ACCESS_KEY\" -o /tmp/restore.dump \"$$EP/$$S3_PRIVATE_BUCKET/backups/db-$$D.dump\"; then OK=$$D; break; fi; done && if [ -z \"$$OK\" ]; then echo '[drill] FAIL: no dump found for last 3 days'; exit 1; fi && echo \"[drill] downloaded db-$$OK.dump ($$(du -h /tmp/restore.dump | cut -f1))\" && pg_restore -h db -U drill -d drill --no-owner --no-privileges /tmp/restore.dump 2>/tmp/warn.txt; echo \"[drill] pg_restore exit=$$? (warnings: $$(wc -l < /tmp/warn.txt))\" && psql -h db -U drill -d drill -t -A -c \"SELECT 'users='||(SELECT count(*) FROM \\\"User\\\") || ' gigs='||(SELECT count(*) FROM \\\"Gig\\\") || ' orders='||(SELECT count(*) FROM \\\"Order\\\") || ' profiles='||(SELECT count(*) FROM \\\"SellerProfile\\\") || ' ledger='||(SELECT count(*) FROM \\\"LedgerEntry\\\")\" | sed 's/^/[drill] RESULT /' && psql -h db -U drill -d drill -t -A -c \"SELECT '[drill] sample gig: '||title FROM \\\"Gig\\\" LIMIT 1\" && echo '[drill] DRILL COMPLETE' && sleep 3600"
