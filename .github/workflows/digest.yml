name: digest

# Daily re-engagement digest (value-gated; silent when there's nothing to say).
# 13:00 UTC = ~18:00 Tashkent — the evening check-your-phone window.
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: trigger digest
        run: |
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "CRON_SECRET repo secret not set — skipping."
            exit 0
          fi
          curl -fsS --max-time 90 -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://gigora.ai/api/cron/digest
