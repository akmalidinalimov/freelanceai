name: e2e

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: freelanceai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/freelanceai?schema=public
      # Test-only secrets/dummies — satisfy prod env-validation; no real services hit.
      AUTH_SECRET: e2e-test-secret-e2e-test-secret-e2e-0123
      AUTH_TRUST_HOST: "true"
      APP_ORIGIN: http://localhost:3000
      TELEGRAM_BOT_TOKEN: "000000:e2e-dummy-bot-token"
      TELEGRAM_BOT_USERNAME: e2e_bot
      TELEGRAM_WEBHOOK_SECRET: e2e-webhook-secret-0123456789
      E2E_TEST_AUTH: "1"
      # Test R2 public base so message-attachment URL validation (keyFromPublicUrl) can pass.
      S3_PUBLIC_BASE_URL: https://r2-test.example.com
      # Test PSP creds so the Payme/Click webhook signature checks pass in the e2e tests.
      # PAYMENT_PROVIDER is intentionally unset → buyer-facing checkout stays MANUAL.
      PAYME_MERCHANT_ID: e2e_payme_merchant
      PAYME_KEY: e2e_payme_key
      CLICK_SERVICE_ID: e2e_click_service
      CLICK_MERCHANT_ID: e2e_click_merchant
      CLICK_SECRET_KEY: e2e_click_secret

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push --skip-generate
      - run: node prisma/seed-e2e.mjs
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
