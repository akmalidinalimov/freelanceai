name: broadcast

# Every 15 min: drains queued admin broadcasts the create-time kick didn't finish AND
# fires scheduled broadcasts once their time arrives (so a scheduled send lands within
# ~15 min of its target). Needs the CRON_SECRET repo secret.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: broadcast
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: drain broadcasts
        run: |
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "CRON_SECRET repo secret not set — skipping."
            exit 0
          fi
          curl -fsS --max-time 95 -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://gigora.ai/api/cron/broadcast
