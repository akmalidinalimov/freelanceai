name: instagram-sync

# Refreshes Instagram tokens nearing expiry (~60d lifetime) and re-syncs every
# connected creator's portfolio. Without this schedule the tokens silently die.
# Needs the repo secret CRON_SECRET to match the app's CRON_SECRET env.
# The endpoint budgets itself to ~60s per pass (skipped profiles caught next day).
on:
  schedule:
    - cron: "20 3 * * *" # daily 03:20 UTC (08:20 Tashkent)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: trigger instagram-sync
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repo secret not set — the sync cron is dead until it is"
            exit 1
          fi
          body=$(curl -fsS -X POST \
            --retry 5 --retry-all-errors --retry-delay 30 --max-time 120 \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://freelanceai.aicreator.academy/api/cron/instagram-sync)
          echo "$body"
          # Green run must mean the pass worked: fail when every profile errored.
          failed=$(echo "$body" | jq -r '.failed // 0')
          synced=$(echo "$body" | jq -r '.synced // 0')
          refreshed=$(echo "$body" | jq -r '.refreshed // 0')
          if [ "$failed" -gt 0 ] && [ "$synced" -eq 0 ] && [ "$refreshed" -eq 0 ]; then
            echo "::error::instagram-sync: every connected profile failed ($failed failures)"
            exit 1
          fi
