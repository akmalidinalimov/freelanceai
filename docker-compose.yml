services:
  db:
    image: postgres:16-alpine
    container_name: freelanceai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: freelanceai
      POSTGRES_PASSWORD: freelanceai
      POSTGRES_DB: freelanceai
    ports:
      - "5432:5432"
    volumes:
      - freelanceai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freelanceai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  freelanceai_pgdata:
